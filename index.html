<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Todo Item Card by Olakunle Idepefo</title>
       
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
        
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <article class="todo-card gradient-border " data-testid="test-todo-card" role="region"
        aria-label="Todo task card">
            
            <h2 data-testid="test-todo-title">
                Design Landing Page
            </h2>

            <p data-testid="test-todo-description">
                Create a responsive landing page design for the new client product launch.
            </p>

            <div>
                <div class="ptitle"><small>Priority:</small></div>                    
                <span 
                    class="priority high"
                    data-testid="test-todo-priority"
                    aria-label="High priority task">
                    🔴 High
                </span>                
            </div>

            <div class="due-section"> 
                <div>
                    <small>Due date:</small><br>             
                    <time 
                    data-testid="test-todo-due-date"
                    datetime="2026-04-16T18:00:00Z"
                    aria-label="April 16, 2026">
                    <b>Apr 16, 2026</b>
                    </time>
                </div> 
                <div 
                data-testid="test-todo-time-remaining"
                aria-live="polite">
                Calculating...
                </div>            
            </div>

            <div>
                <small>Status:</small><br>    
                <span 
                    class="status"
                    data-testid="test-todo-status"
                    aria-label="Task status: Pending">
                    Pending
                </span>
                <div class="progress-bar">
                    <div class="progress pending"></div>
                </div>
            </div>

            <div class="complete-toggle">            
                <input
                type="checkbox"
                id="completeTask"
                data-testid="test-todo-complete-toggle"
                aria-label="Mark task as completed"
                >
            
                <label for="completeTask">
                    Mark as complete
                </label>            
            </div>                   
            
            <div class="actions">            
                <button 
                data-testid="test-todo-edit-button"
                aria-label="Edit task">
                Edit
                </button>
            
                <button 
                data-testid="test-todo-delete-button"
                aria-label="Delete task">
                Delete
                </button>            
            </div>

            <hr>

            <div>
                <div class="ptitle"><small>Tags:</small></div>
                <ul class="tags" data-testid="test-todo-tags"> 
                    <li data-testid="test-todo-tag-work">
                    Work
                    </li>                
                    <li data-testid="test-todo-tag-urgent">
                    Urgent
                    </li>                
                    <li>
                    Design
                    </li>                
                </ul> 
            </div>           
            
        </article>

        <script src="script.js"></script>
    </body>
</html>
